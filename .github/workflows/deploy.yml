name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build:
        description: 'Build images'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check GitHub Pages status
        run: |
          echo "Checking GitHub Pages status..."
          if gh api /repos/:owner/:repo/pages 2>/dev/null; then
            echo "✅ GitHub Pages is enabled"
          else
            echo "❌ GitHub Pages is not enabled"
            echo ""
            echo "Please enable GitHub Pages manually:"
            echo "1. Go to https://github.com/${{ github.repository }}/settings/pages"
            echo "2. Under 'Source', select 'GitHub Actions'"
            echo "3. Click 'Save'"
            echo ""
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Check build output
        run: |
          echo "Checking dist directory..."
          ls -la dist/
          echo ""
          echo "Directory tree:"
          find dist -type f
          echo ""
          if [ ! -d "dist" ]; then
            echo "Error: dist directory not found"
            exit 1
          fi
          if [ -z "$(ls -A dist)" ]; then
            echo "Error: dist directory is empty"
            exit 1
          fi
          echo "✅ Build output check passed"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
          retention-days: 1

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment status
        run: |
          if [ "${{ steps.deployment.outcome }}" == "success" ]; then
            echo "✅ Deployment successful!"
            echo "🌐 Site URL: ${{ steps.deployment.outputs.page_url }}"
          else
            echo "❌ Deployment failed"
            exit 1
          fi
